<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Polyfill guard to prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      (function() {
        try {
          var originalFetch = window.fetch;
          var activeFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return activeFetch;
            },
            set: function(val) {
              activeFetch = val;
            }
          });
        } catch (e) {
          console.warn('Unable to redefine window.fetch:', e);
        }
      })();
    </script>
    <title>答案之书2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
