<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Polyfill guard to prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      (function() {
        try {
          var originalFetch = window.fetch;
          var activeFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return activeFetch;
            },
            set: function(val) {
              activeFetch = val;
            }
          });
        } catch (e) {
          console.warn('Unable to redefine window.fetch:', e);
        }
      })();
    </script>
    <title>答案之书2026</title>
  </head>
  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; background: radial-gradient(circle at center, #110e2e 0%, #05040a 80%, #010103 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: system-ui, -apple-system, sans-serif; overflow: hidden;">
        <!-- Ambient mystical light nebula nodes -->
        <div style="position: absolute; width: 350px; height: 350px; background: radial-gradient(circle, rgba(139, 92, 26, 0.15) 0%, rgba(0,0,0,0) 70%); top: 40%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; filter: blur(20px); animation: ambient-pulse 8s ease-in-out infinite;"></div>
        <div style="position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(0,0,0,0) 70%); top: 35%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; filter: blur(40px); animation: ambient-pulse 12s ease-in-out infinite-reverse;"></div>

        <!-- Floating Golden Stardust stars -->
        <div style="position: absolute; width: 4px; height: 4px; background: #fbbf24; border-radius: 50%; top: 25%; left: 30%; opacity: 0.3; animation: float-star-1 4s ease-in-out infinite; box-shadow: 0 0 8px #fbbf24;"></div>
        <div style="position: absolute; width: 3px; height: 3px; background: #fbbf24; border-radius: 50%; top: 65%; left: 75%; opacity: 0.4; animation: float-star-2 6s ease-in-out infinite; box-shadow: 0 0 6px #fbbf24;"></div>
        <div style="position: absolute; width: 5px; height: 5px; background: #f43f5e; border-radius: 50%; top: 45%; left: 80%; opacity: 0.2; animation: float-star-3 5s ease-in-out infinite; box-shadow: 0 0 10px #f43f5e;"></div>
        <div style="position: absolute; width: 3px; height: 3px; background: #38bdf8; border-radius: 50%; top: 75%; left: 20%; opacity: 0.5; animation: float-star-4 7s ease-in-out infinite; box-shadow: 0 0 6px #38bdf8;"></div>

        <!-- Mystical Astronomical Astrolabe/Orbits -->
        <div style="position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px;">
          
          <!-- Outer Celestial Runic Compass Border (Slow clockwise) -->
          <div style="position: absolute; inset: 0; border: 1px dashed rgba(245, 158, 11, 0.15); border-radius: 50%; animation: spin-clockwise 35s linear infinite;"></div>
          
          <!-- Middle Fate Constellation Belt (Counter clockwise) -->
          <div style="position: absolute; inset: 12px; border: 1.5px dotted rgba(212, 175, 55, 0.3); border-radius: 50%; animation: spin-counter-clockwise 18s linear infinite;">
            <!-- Little bright golden constellation node rotating on ring -->
            <div style="position: absolute; top: 0; left: 50%; width: 5px; height: 5px; background: #f59e0b; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 10px #f59e0b, 0 0 20px #f59e0b;"></div>
          </div>
          
          <!-- Inner Alignment Halo Ring (Clockwise) -->
          <div style="position: absolute; inset: 26px; border: 1px solid rgba(254, 243, 199, 0.08); border-radius: 50%;">
            <div style="position: absolute; inset: 2px; border: 1px dashed rgba(244, 63, 94, 0.25); border-radius: 50%; animation: spin-clockwise 10s linear infinite;"></div>
          </div>
          
          <!-- Sacred Center Golden Heart Spark (Breath scaling with pulse) -->
          <div style="position: absolute; width: 12px; height: 12px; background-color: #f59e0b; border-radius: 50%; z-index: 10; box-shadow: 0 0 20px #f59e0b, 0 0 35px #f59e0b, 0 0 50px rgba(245,158,11,0.5); animation: core-breath 2.5s ease-in-out infinite;"></div>
        </div>

        <!-- Astrological Text Segment -->
        <div style="text-align: center; z-index: 10;">
          <!-- Elegant thin divider string -->
          <div style="font-size: 10px; color: rgba(245, 158, 11, 0.4); letter-spacing: 0.5em; margin-bottom: 12px; font-weight: 300;">✧ ─── ✦ ─── ✧</div>
          
          <!-- Main Title -->
          <h1 style="font-size: 21px; font-weight: 600; letter-spacing: 0.35em; color: #fef3c7; margin: 0 0 0 0.35em; font-family: 'Georgia', 'PingFang SC', 'Noto Serif SC', serif; text-align: center; background: linear-gradient(135deg, #fefef2 0%, #fbd57e 60%, #ce9119 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(245,158,11,0.15);">答案之书</h1>
          
          <p style="font-size: 11px; color: #f59e0b; margin-top: 15px; letter-spacing: 0.2em; font-family: var(--font-mono), monospace, 'PingFang SC'; opacity: 0.9; animation: pulse-text 2.2s ease-in-out infinite;">天命流转 · 福泽汇聚中...</p>
        </div>

        <style>
          @keyframes spin-clockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
          @keyframes spin-counter-clockwise {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
          }
          @keyframes core-breath {
            0%, 100% { transform: scale(0.85); box-shadow: 0 0 15px #f59e0b, 0 0 25px rgba(245,158,11,0.4); opacity: 0.82; }
            50% { transform: scale(1.15); box-shadow: 0 0 25px #f59e0b, 0 0 45px #f59e0b, 0 0 60px rgba(245,158,11,0.6); opacity: 1; }
          }
          @keyframes ambient-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
          }
          @keyframes pulse-text {
            0%, 100% { opacity: 0.55; text-shadow: 0 0 5px rgba(245, 158, 11, 0.1); }
            50% { opacity: 1; text-shadow: 0 0 12px rgba(245, 158, 11, 0.5); }
          }
          @keyframes float-star-1 {
            0%, 100% { transform: translateY(0px) scale(0.8); opacity: 0.1; }
            50% { transform: translateY(-15px) scale(1.2); opacity: 0.65; }
          }
          @keyframes float-star-2 {
            0%, 100% { transform: translateY(0px) scale(1.1); opacity: 0.7; }
            50% { transform: translateY(-20px) scale(0.7); opacity: 0.15; }
          }
          @keyframes float-star-3 {
            0%, 100% { transform: translateY(0px) scale(0.7); opacity: 0.15; }
            50% { transform: translateY(-12px) scale(1.1); opacity: 0.55; }
          }
          @keyframes float-star-4 {
            0%, 100% { transform: translateY(0px) scale(1.2); opacity: 0.6; }
            50% { transform: translateY(-18px) scale(0.8); opacity: 0.2; }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
